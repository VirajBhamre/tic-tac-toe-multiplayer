# Requires a root `.env` file (copy from `.env.example`). No credentials belong in this file.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - nakama_pg_data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 3s
      timeout: 3s
      retries: 5

  nakama:
    image: heroiclabs/nakama:3.37.0
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NAKAMA_DATABASE_ADDRESS: ${NAKAMA_DATABASE_ADDRESS}
      KEEPALIVE_ORIGIN: ${KEEPALIVE_ORIGIN:-}
      KEEPALIVE_HTTP_KEY: ${KEEPALIVE_HTTP_KEY:-}
      KEEPALIVE_INTERVAL_SEC: ${KEEPALIVE_INTERVAL_SEC:-300}
    entrypoint:
      - "/bin/sh"
      - "-ecx"
      - |
        /nakama/nakama migrate up --database.address "$$NAKAMA_DATABASE_ADDRESS" &&
        exec /nakama/nakama \
          --name nakama1 \
          --database.address "$$NAKAMA_DATABASE_ADDRESS" \
          --logger.level DEBUG \
          --session.token_expiry_sec 7200 \
          --runtime.path /nakama/data/modules \
          --runtime.env "KEEPALIVE_ORIGIN=$$KEEPALIVE_ORIGIN" \
          --runtime.env "KEEPALIVE_HTTP_KEY=$$KEEPALIVE_HTTP_KEY" \
          --runtime.env "KEEPALIVE_INTERVAL_SEC=$$KEEPALIVE_INTERVAL_SEC"
    ports:
      - "7350:7350"
      - "7351:7351"
    volumes:
      - ./dist:/nakama/data/modules

volumes:
  nakama_pg_data:
