# Reverse proxy in front of Nakama API (7350 → 127.0.0.1:7349). Adds CORS so browsers work
# when upstream strips Origin or strips response CORS headers (e.g. some edge proxies).

user www-data;
worker_processes auto;
pid /tmp/nginx.pid;
error_log /dev/stderr info;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  access_log /dev/stdout;

  map $http_upgrade $connection_upgrade {
    default upgrade;
    "" close;
  }

  map $http_origin $cors_allow_origin {
    default $http_origin;
    "" "*";
  }

  server {
    listen 7350 default_server;
    client_max_body_size 512k;

    location / {
      if ($request_method = OPTIONS) {
        add_header Access-Control-Allow-Origin $cors_allow_origin always;
        add_header Access-Control-Allow-Methods "GET, HEAD, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, User-Agent, Accept" always;
        add_header Access-Control-Max-Age "86400" always;
        return 204;
      }

      proxy_pass http://127.0.0.1:7349;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Grpc-Timeout $http_grpc_timeout;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;

      proxy_hide_header Access-Control-Allow-Origin;
      proxy_hide_header Access-Control-Allow-Methods;
      proxy_hide_header Access-Control-Allow-Headers;

      add_header Access-Control-Allow-Origin $cors_allow_origin always;
      add_header Access-Control-Allow-Headers "Authorization, Content-Type, User-Agent, Accept" always;
      add_header Access-Control-Allow-Methods "GET, HEAD, POST, PUT, DELETE, OPTIONS" always;
      add_header Vary "Origin" always;

      proxy_read_timeout 3600s;
      proxy_send_timeout 3600s;
    }
  }
}
